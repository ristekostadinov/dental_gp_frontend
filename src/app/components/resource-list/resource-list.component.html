<div class="container">
    <h2>Resource List</h2>
    <table mat-table [dataSource]="resources" class="mat-elevation-z8">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let resource">{{ resource.id }}</td>
      </ng-container>
  
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let resource">{{ resource.name }}</td>
      </ng-container>

      <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef>Address</th>
          <td mat-cell *matCellDef="let resource">{{ resource.address }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let resource">{{ resource.description }}</td>
      </ng-container>
  
      <ng-container matColumnDef="edit/delete">
        <th mat-header-cell *matHeaderCellDef>Edit/Delete</th>
  
        <td mat-cell *matCellDef="let resource">
          <div class="row">
            <div class="col">
              <a
                mat-raised-button
                color="primary"
                type="submit"
                class="w-75"
                routerLink="edit-category/{{ resource.id }}"
              >
                Edit
                </a
              >
            </div>
            <div class="col">
              <button
                mat-raised-button
                color="warn"
                type="submit"
                class="w-75"
                (click)="deleteResource(resource.id)"
              >
                Delete
              </button>
            </div>
          </div>
        </td>
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  
    <mat-paginator
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="handlePageEvent($event)"
    >
    </mat-paginator>
  </div>
