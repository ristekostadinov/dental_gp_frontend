<div class="container">
    <h2>Insert Dental Service</h2>
    <form [formGroup]="createDentalServiceForm" (ngSubmit)="onSubmit()">
      <mat-form-field>
        <mat-label>Service Name: </mat-label>
        <input matInput type="text" formControlName="name" />
        @if(name?.hasError('required')){
        <mat-error>Service name is <strong>required</strong></mat-error>
        }
      </mat-form-field>
  <div class="row  justify-content-center">
      <div class="col">
          <button
          mat-raised-button
          color="primary"
          type="submit"
          class="w-75"
          [disabled]="!createDentalServiceForm.valid"
        >
          Save Service
        </button>
      </div>
  
  </div>
  
    </form>
  </div>
