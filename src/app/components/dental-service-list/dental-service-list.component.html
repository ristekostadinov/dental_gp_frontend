<div class="container">
    <h2>Dental Service List</h2>
    <table mat-table [dataSource]="dentalServiceList" class="mat-elevation-z8">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let dentalService">{{ dentalService.id }}</td>
      </ng-container>
  
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let dentalService">{{ dentalService.name }}</td>
      </ng-container>
  
      <ng-container matColumnDef="edit/delete">
        <th mat-header-cell *matHeaderCellDef>Edit/Delete</th>
  
        <td mat-cell *matCellDef="let dentalService">
          <div class="row">
            <div class="col">
              <a
                mat-raised-button
                color="primary"
                type="submit"
                class="w-75"
                routerLink="edit-dental-service/{{ dentalService.id }}"
              >
                Edit
                </a
              >
            </div>
            <div class="col">
              <button
                mat-raised-button
                color="warn"
                type="submit"
                class="w-75"
                (click)="deleteDentalService(dentalService.id)"
              >
                Delete
              </button>
            </div>
          </div>
        </td>
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  
    <mat-paginator
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 20]"
      (page)="handlePageEvent($event)"
    >
    </mat-paginator>
  </div>
