<div class="container">
  <h2 i18n>Insert Resource Information</h2>
  <form [formGroup]="createResourceForm" (ngSubmit)="onSubmit()">
    <mat-form-field>
      <mat-label i18n>Name: </mat-label>
      <input matInput type="text" formControlName="name" />
      @if(name?.hasError('required')){
      <mat-error i18n>Reource name is <strong>required</strong></mat-error>
      }
    </mat-form-field>
    <mat-form-field>
      <mat-label i18n>Address: </mat-label>
      <input matInput type="text" formControlName="address" />
      @if(address?.hasError('required')){
      <mat-error i18n>Resource address is <strong>required</strong></mat-error>
      }
    </mat-form-field>

    <mat-form-field>
      <mat-label i18n>Description: </mat-label>
      <input matInput type="text" formControlName="description" />
      @if(description?.hasError('required')){
      <mat-error i18n>Resource description is <strong>required</strong></mat-error>
      }
    </mat-form-field>

    <div class="row justify-content-center">
      <div class="col">
        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="w-75"
          [disabled]="!createResourceForm.valid"
          i18n
        >
          Save Service
        </button>
      </div>
    </div>
  </form>
</div>
